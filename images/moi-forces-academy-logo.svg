<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800" role="img" aria-label="Moi Forces Academy logo">
  <title>Moi Forces Academy (placeholder logo)</title>
  <desc>Placeholder circular logo with initials MFA and a laurel-style accent. Replace with official logo file when available.</desc>
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1a3a"/>
      <stop offset="100%" stop-color="#B22222"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>
  <g filter="url(#soft)">
    <circle cx="400" cy="400" r="360" fill="url(#g)" />
    <circle cx="400" cy="400" r="300" fill="#fff" opacity="0.06" />
  </g>
  <g transform="translate(0,10)">
    <circle cx="400" cy="320" r="140" fill="#fff" opacity="0.06" />
    <text x="50%" y="52%" text-anchor="middle" font-family="Playfair Display, Georgia, serif" font-weight="800" font-size="220" fill="#ffffff">MFA</text>
    <g transform="translate(400,540)" text-anchor="middle" font-family="Inter, Arial, sans-serif">
      <text y="0" font-size="34" fill="#ffffff" font-weight="700">Moi Forces Academy</text>
      <text y="36" font-size="18" fill="#f7f7f7">Primary &amp; Junior School</text>
    </g>
  </g>
</svg>
